<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAD Alpha • Institutional Trading Strategies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/80 backdrop-blur-lg border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-cyan-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">J</div>
                <div class="heading-font text-3xl font-semibold tracking-tighter">JAD <span class="text-cyan-400">ALPHA</span></div>
            </div>
            
            <div class="hidden md:flex items-center gap-10 text-sm font-medium">
                <a href="#strategies" class="hover:text-cyan-400">Strategies</a>
                <a href="#performance" class="hover:text-cyan-400">Performance</a>
                <a href="#platform" class="text-cyan-400">Platform</a>
                <a href="#about" class="hover:text-cyan-400">About</a>
            </div>

            <button onclick="showAuthModal()" class="bg-white text-black px-6 py-3 rounded-2xl font-semibold hover:bg-cyan-400">
                Client Login / Sign Up
            </button>
        </div>
    </nav>

    <!-- HERO + Other sections remain the same as last version -->
    <!-- PLATFORM SECTION (same rich version) -->
    <section id="platform" class="py-28 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-center mb-16">
                <h2 class="heading-font text-6xl font-bold">JAD Alpha Platform</h2>
                <p class="text-zinc-400 mt-4">Live Strategies • Real-time Signals</p>
            </div>

            <div class="grid md:grid-cols-4 gap-6 mb-16">
                <div class="bg-zinc-950 rounded-3xl p-6"><p class="text-zinc-400">AUM</p><p class="text-4xl font-bold">$8.47M</p></div>
                <div class="bg-zinc-950 rounded-3xl p-6"><p class="text-emerald-400">Today's P&amp;L</p><p class="text-4xl font-bold text-emerald-400">+$124,890</p></div>
                <div class="bg-zinc-950 rounded-3xl p-6"><p class="text-zinc-400">Active</p><p class="text-4xl font-bold">7 Strategies</p></div>
                <div class="bg-zinc-950 rounded-3xl p-6"><p class="text-zinc-400">Sharpe</p><p class="text-4xl font-bold text-cyan-400">3.12</p></div>
            </div>

            <!-- Strategy Cards & Signals (same as before) -->
            <h3 class="text-2xl font-semibold mb-8">Active Strategies</h3>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="bg-zinc-950 border border-emerald-500/30 rounded-3xl p-8 card-hover">
                    <span class="bg-emerald-500 text-black px-4 py-1 rounded-full text-xs font-bold">LIVE</span>
                    <h4 class="text-2xl font-semibold mt-6">Neural Alpha</h4>
                    <p class="text-emerald-400 text-5xl font-mono mt-6">+4.82%</p>
                    <button class="mt-8 w-full py-4 bg-emerald-500 text-black rounded-2xl">View Signals</button>
                </div>
            </div>
        </div>
    </section>

    <!-- AUTH MODAL (Login + Sign Up) -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
            <div class="flex border-b border-zinc-700 mb-6">
                <button onclick="switchTab(0)" id="loginTab" class="flex-1 py-3 font-semibold border-b-2 border-cyan-400 text-cyan-400">Login</button>
                <button onclick="switchTab(1)" id="signupTab" class="flex-1 py-3 font-semibold text-zinc-400">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <input type="email" id="loginEmail" value="demo@jadalpha.com" placeholder="Email" 
                       class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-4 outline-none focus:border-cyan-400">
                <input type="password" id="loginPass" value="123" placeholder="Password" 
                       class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-6 outline-none focus:border-cyan-400">
                <button onclick="loginUser()" class="w-full bg-cyan-500 text-black py-5 rounded-2xl font-semibold">Sign In</button>
            </div>

            <!-- Sign Up Form -->
            <div id="signupForm" class="hidden">
                <input type="text" id="fullName" placeholder="Full Name" class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-4">
                <input type="email" id="signupEmail" placeholder="Email Address" class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-4">
                <input type="password" id="signupPass" placeholder="Create Password" class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-4">
                <input type="password" id="confirmPass" placeholder="Confirm Password" class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-6">
                <button onclick="signupUser()" class="w-full bg-cyan-500 text-black py-5 rounded-2xl font-semibold">Create Account</button>
            </div>

            <p onclick="hideAuthModal()" class="text-center mt-6 text-zinc-400 cursor-pointer hover:text-white">Close</p>
        </div>
    </div>

    <script>
        let currentTab = 0;

        function showAuthModal() {
            document.getElementById('authModal').classList.remove('hidden');
            switchTab(0);
        }

        function hideAuthModal() {
            document.getElementById('authModal').classList.add('hidden');
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 0) {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('loginTab').classList.add('border-b-2', 'border-cyan-400', 'text-cyan-400');
                document.getElementById('signupTab').classList.remove('border-b-2', 'border-cyan-400', 'text-cyan-400');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupForm').classList.remove('hidden');
                document.getElementById('signupTab').classList.add('border-b-2', 'border-cyan-400', 'text-cyan-400');
                document.getElementById('loginTab').classList.remove('border-b-2', 'border-cyan-400', 'text-cyan-400');
            }
        }

        function loginUser() {
            hideAuthModal();
            alert("✅ Login Successful!\n\nWelcome back to JAD Alpha Platform");
            document.getElementById('platform').scrollIntoView({ behavior: 'smooth' });
        }

        function signupUser() {
            const name = document.getElementById('fullName').value;
            if (name.trim() === "") {
                alert("Please enter your full name");
                return;
            }
            hideAuthModal();
            alert(`🎉 Account Created Successfully!\n\nWelcome ${name}!\n\nYou can now login with your email.`);
            // Auto switch to login tab
            setTimeout(() => {
                showAuthModal();
                switchTab(0);
            }, 800);
        }
    </script>
</body>
</html>
