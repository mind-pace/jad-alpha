<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAD Alpha • Institutional Trading Strategies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        .card-hover:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/80 backdrop-blur-lg border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-cyan-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">J</div>
                <div class="heading-font text-3xl font-semibold tracking-tighter">JAD <span class="text-cyan-400">ALPHA</span></div>
            </div>
            <div class="hidden md:flex gap-10 text-sm">
                <a href="#strategies" class="hover:text-cyan-400">Strategies</a>
                <a href="#performance" class="hover:text-cyan-400">Performance</a>
                <a href="#platform" class="text-cyan-400">Platform</a>
                <a href="#about" class="hover:text-cyan-400">About</a>
            </div>
            <button onclick="showLoginModal()" class="bg-white text-black px-6 py-3 rounded-2xl font-semibold hover:bg-cyan-400">
                Client Login
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg min-h-screen flex items-center pt-20">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
            <div>
                <h1 class="heading-font text-6xl md:text-7xl font-bold leading-none">Alpha that actually compounds</h1>
                <p class="mt-6 text-xl text-zinc-400">Institutional trading strategies with real performance.</p>
                <button onclick="document.getElementById('platform').scrollIntoView({behavior:'smooth'})" 
                        class="mt-8 bg-cyan-500 text-black px-8 py-4 rounded-2xl font-semibold">
                    Open Platform
                </button>
            </div>
        </div>
    </section>

    <!-- PLATFORM -->
    <section id="platform" class="py-28 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-bold text-center heading-font">JAD Alpha Platform</h2>
            <p class="text-center text-zinc-400 mt-4">Live Strategies & Signals</p>

            <div class="mt-12 text-center">
                <p class="text-emerald-400">Click "Client Login" → Use any email and click Sign In</p>
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-center">Client Portal</h2>
            <div class="mt-6 space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-zinc-800 rounded-2xl" value="demo@jadalpha.com">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-zinc-800 rounded-2xl" value="123">
                <button onclick="fakeLogin()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-bold">Sign In</button>
            </div>
            <p onclick="hideModal()" class="text-center mt-6 text-zinc-400 cursor-pointer">Cancel</p>
        </div>
    </div>

    <script>
        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
        }
        function hideModal() {
            document.getElementById('loginModal').classList.add('hidden');
        }
        function fakeLogin() {
            hideModal();
            alert("✅ Login Successful!\nWelcome to JAD Alpha Platform (Demo Mode)");
            document.getElementById('platform').scrollIntoView({ behavior: "smooth" });
        }
    </script>
</body>
</html>
