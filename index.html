<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAD Alpha • Institutional Trading Strategies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); }

        .nav-link { position: relative; }
        .nav-link:after {
            content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0;
            background-color: rgb(0 243 255); transition: all 0.3s ease;
        }
        .nav-link:hover:after { width: 100%; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/80 backdrop-blur-lg border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-cyan-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">J</div>
                <div class="heading-font text-3xl font-semibold tracking-tighter">JAD <span class="text-cyan-400">ALPHA</span></div>
            </div>
            
            <div class="hidden md:flex items-center gap-10 text-sm font-medium">
                <a href="#strategies" class="nav-link">Strategies</a>
                <a href="#performance" class="nav-link">Performance</a>
                <a href="#platform" class="nav-link text-cyan-400">Platform</a>
                <a href="#about" class="nav-link">About</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('contact').scrollIntoView({ behavior: 'smooth' })" 
                        class="px-6 py-3 text-sm font-semibold border border-zinc-700 hover:border-cyan-400 rounded-2xl">
                    Get Access
                </button>
                <button onclick="showLoginModal()" 
                        class="bg-white text-black px-6 py-3 text-sm font-semibold rounded-2xl hover:bg-cyan-400 transition-colors">
                    Client Login
                </button>
            </div>
        </div>
    </nav>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-10 w-full max-w-md">
            <h2 class="text-3xl font-semibold heading-font text-center">Client Portal</h2>
            <p class="text-center text-zinc-400 mt-2">Sign in to access your strategies</p>
            
            <div class="mt-8 space-y-6">
                <input id="email" type="email" placeholder="Email Address" value="demo@jadalpha.com"
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none focus:border-cyan-400">
                
                <input id="password" type="password" placeholder="Password" value="demo123"
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 outline-none focus:border-cyan-400">
                
                <button onclick="login()" 
                        class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-semibold py-5 rounded-2xl text-lg">
                    Sign In
                </button>
            </div>
            
            <p onclick="hideLoginModal()" class="text-center text-zinc-500 mt-6 cursor-pointer hover:text-zinc-400">
                Cancel
            </p>
        </div>
    </div>

    <!-- Rest of your sections (Hero, Strategies, Performance, Platform, etc.) -->
    <!-- Paste the rest of your previous code here (from Hero down to Footer) -->

    <script>
        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
        }

        function hideLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
        }

        function login() {
            hideLoginModal();
            alert("✅ Login Successful!\n\nWelcome to JAD Alpha Client Portal (Demo)");
            
            // Scroll to Platform after login
            setTimeout(() => {
                document.getElementById('platform').scrollIntoView({ behavior: 'smooth' });
            }, 800);
        }

        // Keep your previous toggleStrategy function here
        function toggleStrategy(btn) {
            if (btn.textContent === "ON") {
                btn.textContent = "OFF";
                btn.classList.remove("text-emerald-400");
                btn.classList.add("text-zinc-400");
            } else {
                btn.textContent = "ON";
                btn.classList.add("text-emerald-400");
                btn.classList.remove("text-zinc-400");
            }
        }
    </script>
</body>
</html>
